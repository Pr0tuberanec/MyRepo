map_generator: "random_grid"
dynamic: "HolonomicDynamic"
lifelong: false
use_gire: false
window: 0.3
max_steps: 1000
frameskip: 15
max_obs: 3 # can be adjusted
include_goal_dist_in_state: false # goal_dist + min_goal_dist per agent in critic global state
pos_shaping_factor: 1.0 # can be adjusted
goal_rad_eval_factor: 2.5 # reward/eval radius = factor * done goal_rad
legacy_rewards: true # original shaping + team bonus when all on goal
collision_penalty_start: 0.0
collision_penalty_end: -0.1
collision_penalty_curriculum_frames: 500_000 # linear 0 -> -0.1 over this many env frames
contact_force: 500
contact_margin: 0.001

map_kwargs:
  num_rows: 20
  num_cols: 20
  obstacle_density: 0.0
  num_agents: 8
  grain_factor: 3

dynamic_kwargs:
  accel: 5.0
  max_speed: 6.0
  damping: 0.25
  mass: 1.0
  dt: 0.01