map_generator: "random_grid"
dynamic: "DiffDriveDynamic"
lifelong: false
window: 0.3
max_steps: 1000
frameskip: 15
max_obs: 3 # can be adjusted
pos_shaping_factor: 1.0 # can be adjusted
contact_force: 500
contact_margin: 0.001

map_kwargs:
  num_rows: 20
  num_cols: 20
  obstacle_density: 0.0
  num_agents: 8
  grain_factor: 3

dynamic_kwargs:
  linear_speed_max: 1.0
  linear_speed_min: -1.0
  angular_speed_max: 2.0
  angular_speed_min: -2.0
  mass: 1.0
  dt: 0.01
